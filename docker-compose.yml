services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - quiz-net

  player-app:
    build:
      context: .
      dockerfile: player-app/Dockerfile
      args:
        VITE_WS_URL: ws://localhost:3080/ws
        VITE_API_URL: ""
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - quiz-net

  host-app:
    build:
      context: .
      dockerfile: host-app/Dockerfile
      args:
        VITE_WS_URL: ws://localhost:3081/ws
        VITE_API_URL: ""
    restart: unless-stopped
    expose:
      - "3002"
    networks:
      - quiz-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3080:80"
      - "3081:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - player-app
      - host-app
    networks:
      - quiz-net

networks:
  quiz-net:
    driver: bridge